<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat RAG | DB AI Assistant</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="/style.css" rel="stylesheet">
    <!-- PrismJS SQL -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <!-- Deep Chat -->
    <script type="module" src="https://unpkg.com/deep-chat@latest/dist/deepChat.bundle.js"></script>
</head>

<body class="overflow-hidden">

    <div x-data="chatApp()" class="d-flex w-100 vh-100 wrapper-scroll">

        <!-- Mobile Toggle Header -->
        <header
            class="mobile-header d-md-none w-100 py-2 px-3 border-bottom border-secondary border-opacity-25 glass-header d-flex align-items-center justify-content-between position-fixed top-0">
            <h5 class="m-0 fw-bold d-flex align-items-center gap-2 text-primary">
                <i class="bi bi-robot"></i> <span>DB AI</span>
            </h5>
            <button class="btn btn-dark border-secondary p-2 rounded-3" @click="isSidebarOpen = true">
                <i class="bi bi-list fs-4"></i>
            </button>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column z-3" :class="{'mobile-open': isSidebarOpen}">
            <div x-show="isSidebarOpen" class="sidebar-overlay d-md-none" @click="isSidebarOpen = false"></div>

            <div class="sidebar-header p-3 border-bottom border-secondary border-opacity-10 d-flex justify-content-between align-items-center"
                style="background: var(--bg-darker);">
                <h4 class="m-0 fw-bold d-flex align-items-center gap-2">
                    <i class="bi bi-robot text-primary"></i>
                    <span style="color: var(--c-text-1);">DB RAG AI</span>
                </h4>
                <button class="btn btn-link text-light d-md-none p-0" @click="isSidebarOpen = false">
                    <i class="bi bi-x-lg fs-4"></i>
                </button>
            </div>

            <!-- Dashboard Navigation -->
            <nav class="p-2">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a href="/" class="nav-link w-100 text-start btn-custom rounded-3 active-nav">
                            <i class="bi bi-chat-dots me-2"></i> Chat RAG
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/rules" class="nav-link w-100 text-start btn-custom rounded-3">
                            <i class="bi bi-file-earmark-code me-2"></i> Reglas de IA
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/databases" class="nav-link w-100 text-start btn-custom rounded-3">
                            <i class="bi bi-database me-2"></i> Bases de Datos
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Chat History -->
            <div class="mt-auto border-top border-secondary p-3">
                <button class="btn btn-outline-primary w-100 rounded-pill py-2 shadow" @click="newChat()">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo Chat
                </button>
            </div>

            <div class="chat-history-container flex-grow-1 overflow-auto px-2 pb-4">
                <div class="text-secondary small fw-bold px-2 mb-2 mt-3 text-uppercase opacity-50">Recientes</div>
                <ul class="list-unstyled d-flex flex-column gap-1">
                    <template x-for="chat in chats" :key="chat.id">
                        <li class="d-flex align-items-center rounded-3 chat-history-item"
                            :class="{'active': chat.id === currentChatId}">
                            <button class="btn btn-sm text-start text-truncate py-2 px-3 flex-grow-1 header-chat-btn"
                                style="color: var(--c-text-1);" @click="loadMessages(chat.id)">
                                <i class="bi bi-chat-left-dots me-2 opacity-50"></i>
                                <span x-text="chat.title || 'Consulta RAG'"></span>
                            </button>
                            <button class="btn btn-sm btn-link text-danger header-chat-btn-delete px-2"
                                @click.stop="deleteChat(chat.id)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </li>
                    </template>
                </ul>
            </div>
        </aside>

        <!-- Main Panel -->
        <main class="main-panel border-0">

            <div class="chat-viewport flex-grow-1 p-0 overflow-hidden d-flex flex-column h-100 position-relative">

                <!-- Fixed Top Bar for DB Selection -->
                <div class="p-3 border-bottom border-secondary border-opacity-10 d-flex align-items-center justify-content-between z-3"
                    style="background-color: var(--bg-main) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <span
                            class="badge border border-secondary border-opacity-25 px-3 py-2 d-flex align-items-center gap-2"
                            style="background: var(--bg-darker); border-radius: 12px;">
                            <i class="bi bi-database-fill text-primary"></i>
                            <select x-model="selectedDatabaseId" :disabled="currentChatId !== null"
                                :class="currentChatId !== null ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'"
                                class="form-select form-select-sm bg-transparent border-0 text-light fw-medium p-0 pe-4 shadow-none"
                                style="width: auto; min-width: 150px;">
                                <option value="" disabled selected>Selecciona DB Target...</option>
                                <template x-for="db in activeDatabases" :key="db.id">
                                    <option :value="db.id" x-text="db.name" class="bg-body text-body"></option>
                                </template>
                            </select>
                        </span>
                        <button x-show="currentChatId"
                            class="btn btn-sm btn-outline-secondary border-opacity-25 rounded-pill px-3 fade-in"
                            @click="newChat()">
                            <i class="bi bi-plus-lg me-1"></i> Nuevo Chat
                        </button>
                    </div>
                    <div></div> <!-- Espaciador para mantener estructura -->

                    <div class="d-flex align-items-center gap-2 ms-2 bg-dark bg-opacity-50 px-2 py-1 rounded-pill border border-secondary border-opacity-25 shadow-sm"
                        style="font-size: 0.75rem; background: var(--bg-darker) !important;">
                        <span :class="systemInfo.aiProvider === 'ollama' ? 'text-warning' : 'text-info'">
                            <i class="bi"
                                :class="systemInfo.aiProvider === 'ollama' ? 'bi-cpu-fill' : 'bi-cloud-check-fill'"></i>
                        </span>
                        <span class="text-secondary fw-bold" x-text="systemInfo.aiProvider.toUpperCase()"></span>
                        <span class="opacity-25">|</span>
                        <span class="text-secondary text-truncate" style="max-width: 150px" x-text="systemInfo.model"
                            :title="systemInfo.model"></span>
                    </div>

                    <!-- Theme Toggle -->
                    <button @click="toggleTheme()" class="btn btn-link text-secondary p-1 ms-2 no-ring"
                        :title="theme === 'dark' ? 'Modo Claro' : 'Modo Oscuro'">
                        <i class="bi"
                            :class="theme === 'dark' ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
                    </button>
                </div>

                <!-- Deep Chat Component -->
                <deep-chat id="rag-deep-chat" class="h-100 w-100 border-0" history='[]'>
                    <!-- Intro Panel Modernizado -->
                    <div style="display: none;">
                        <div style="padding: 5rem 2rem; text-align: center; color: var(--c-text-1);">
                            <div style="font-size: 3rem; margin-bottom: 1.5rem;">🚀</div>
                            <h1
                                style="font-size: 2.5rem; font-weight: 700; color: var(--c-text-1); margin-bottom: 0.5rem; letter-spacing: -0.01em;">
                                DB RAG Explorer</h1>
                            <p
                                style="color: var(--c-text-2); font-size: 1.1rem; max-width: 500px; margin: 0 auto 3rem auto; line-height: 1.6;">
                                Analiza y extrae conocimiento de tus bases de datos con la simplicidad de una charla.
                            </p>
                            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                                <div
                                    style="background: var(--bg-darker); border: 1px solid var(--c-border); padding: 1.5rem; border-radius: 12px; width: 180px;">
                                    <div style="color: var(--c-primary); font-size: 1.5rem; margin-bottom: 0.5rem;"><i
                                            class="bi bi-cpu"></i></div>
                                    <div style="font-weight: 600; font-size: 0.9rem;">RAG Engine</div>
                                </div>
                                <div
                                    style="background: var(--bg-darker); border: 1px solid var(--c-border); padding: 1.5rem; border-radius: 12px; width: 180px;">
                                    <div
                                        style="color: var(--c-text-1); opacity: 0.8; font-size: 1.5rem; margin-bottom: 0.5rem;">
                                        <i class="bi bi-chat"></i></div>
                                    <div style="font-weight: 600; font-size: 0.9rem;">Clean Chat</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </deep-chat>
            </div>

        </main>
    </div>

    <!-- Chart Modal -->
    <div class="modal fade" id="chartModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-secondary border-opacity-50 shadow-lg"
                style="background: var(--bg-main); color: var(--c-text-1);">
                <div class="modal-header border-bottom border-secondary border-opacity-25">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-bar-chart-line text-primary me-2"></i>
                        Visualización de Datos
                    </h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"
                        @click="closeChartModal()"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Chart Controls -->
                    <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
                        <label class="text-secondary small fw-bold">Tipo de Gráfico:</label>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                :class="{'active': chartType === 'bar'}" @click="changeChartType('bar')">
                                <i class="bi bi-bar-chart-fill me-1"></i> Barras
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                :class="{'active': chartType === 'line'}" @click="changeChartType('line')">
                                <i class="bi bi-graph-up me-1"></i> Línea
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                :class="{'active': chartType === 'pie'}" @click="changeChartType('pie')">
                                <i class="bi bi-pie-chart-fill me-1"></i> Pastel
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                :class="{'active': chartType === 'doughnut'}" @click="changeChartType('doughnut')">
                                <i class="bi bi-circle-fill me-1"></i> Dona
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                :class="{'active': chartType === 'radar'}" @click="changeChartType('radar')">
                                <i class="bi bi-bullseye me-1"></i> Radar
                            </button>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-info ms-auto" @click="autoDetectChartType()">
                            <i class="bi bi-magic me-1"></i> Auto
                        </button>
                    </div>
                    
                    <!-- Chart Container -->
                    <div class="chart-container position-relative" style="height: 50vh; min-height: 300px;">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                    
                    <!-- Data Summary -->
                    <div class="mt-3 p-3 rounded-3 border border-secondary border-opacity-25" 
                        style="background: var(--bg-darker);" x-show="chartData && chartData.length > 0">
                        <small class="text-secondary">
                            <i class="bi bi-table me-1"></i>
                            <span x-text="chartData.length"></span> registros | 
                            <span x-text="Object.keys(chartData[0] || {}).length"></span> columnas
                        </small>
                    </div>
                </div>
                <div class="modal-footer border-top border-secondary border-opacity-25">
                    <button type="button" class="btn btn-outline-secondary" @click="downloadChart()">
                        <i class="bi bi-download me-1"></i> Descargar PNG
                    </button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" @click="closeChartModal()">
                        <i class="bi bi-x-lg me-1"></i> Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/src/utils.js"></script>
    <script src="/src/chartService.js"></script>
    <script src="/src/chat.js"></script>
</body>

</html>
