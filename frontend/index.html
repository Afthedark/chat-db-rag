<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat RAG | DB AI Assistant</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="/styles/base.css" rel="stylesheet">
    <link href="/styles/mobile.css" rel="stylesheet">
    <!-- PrismJS SQL -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Deep Chat -->
    <script type="module" src="https://unpkg.com/deep-chat@latest/dist/deepChat.bundle.js"></script>
</head>

<body class="overflow-hidden">

    <div x-data="chatApp()" class="d-flex w-100 vh-100 wrapper-scroll">

        <!-- Mobile Toggle Header -->
        <header
            class="mobile-header d-md-none w-100 py-2 px-3 border-bottom border-secondary border-opacity-25 glass-header d-flex align-items-center justify-content-between position-fixed top-0">
            <h5 class="m-0 fw-bold d-flex align-items-center gap-2 text-primary">
                <i class="bi bi-robot"></i> <span>DB AI</span>
            </h5>
            <button class="btn btn-dark border-secondary p-2 rounded-3" @click="isSidebarOpen = true">
                <i class="bi bi-list fs-4"></i>
            </button>
        </header>

        <!-- Sidebar Overlay (outside sidebar for proper z-index) -->
        <div x-show="isSidebarOpen" 
             x-transition:enter="transition-opacity ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition-opacity ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="sidebar-overlay d-md-none" 
             @click="isSidebarOpen = false"
             style="display: none;"></div>

        <!-- Sidebar -->
        <aside class="sidebar d-flex flex-column" :class="{'mobile-open': isSidebarOpen}">
            <div class="sidebar-header p-3 border-bottom border-secondary border-opacity-10 d-flex justify-content-between align-items-center"
                style="background: var(--bg-darker);">
                <h4 class="m-0 fw-bold d-flex align-items-center gap-2">
                    <i class="bi bi-robot text-primary"></i>
                    <span style="color: var(--c-text-1);">DB RAG AI</span>
                </h4>
                <button class="btn btn-link text-light d-md-none p-0" @click="isSidebarOpen = false" aria-label="Cerrar menú">
                    <i class="bi bi-x-lg fs-4"></i>
                </button>
            </div>

            <!-- Dashboard Navigation -->
            <nav class="p-2">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a href="/" class="nav-link w-100 text-start btn-custom rounded-3 active-nav">
                            <i class="bi bi-chat-dots me-2"></i> Chat RAG
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/rules" class="nav-link w-100 text-start btn-custom rounded-3">
                            <i class="bi bi-file-earmark-code me-2"></i> Reglas de IA
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin/databases" class="nav-link w-100 text-start btn-custom rounded-3">
                            <i class="bi bi-database me-2"></i> Bases de Datos
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Chat History -->
            <div class="chat-history-container flex-grow-1 overflow-auto px-2 pb-4">
                <div class="text-secondary small fw-bold px-2 mb-2 mt-3 text-uppercase opacity-50">Recientes</div>
                <ul class="list-unstyled d-flex flex-column gap-1">
                    <template x-for="chat in chats" :key="chat.id">
                        <li class="d-flex align-items-center rounded-3 chat-history-item"
                            :class="{'active': chat.id === currentChatId}">
                            <button class="btn btn-sm text-start text-truncate py-2 px-3 flex-grow-1 header-chat-btn"
                                style="color: var(--c-text-1);" @click="loadMessages(chat.id)">
                                <i class="bi bi-chat-left-dots me-2 opacity-50"></i>
                                <span x-text="chat.title || 'Consulta RAG'"></span>
                            </button>
                            <button class="btn btn-sm btn-link text-danger header-chat-btn-delete px-2"
                                @click.stop="deleteChat(chat.id)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Sidebar Footer: New Chat -->
            <div class="mt-auto border-top border-secondary border-opacity-10 p-3">
                <button class="btn btn-outline-primary w-100 rounded-pill py-2 shadow" @click="newChat()">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo Chat
                </button>
            </div>
        </aside>

        <!-- Main Panel -->
        <main class="main-panel border-0">

            <div class="chat-viewport flex-grow-1 p-0 overflow-hidden d-flex flex-column h-100 position-relative">

                <!-- Fixed Top Bar for DB Selection -->
                <div class="p-3 border-bottom border-secondary border-opacity-10 d-flex align-items-center justify-content-between z-3 flex-wrap flex-md-nowrap gap-2"
                    style="background-color: var(--bg-main) !important;">
                    
                    <!-- Left: DB Selector + New Chat -->
                    <div class="d-flex align-items-center gap-2 gap-md-3 flex-shrink-0">
                        <!-- Database Selector Pill -->
                        <div class="db-selector-wrapper" 
                             :title="currentChatId ? 'Base de datos bloqueada - Inicia un nuevo chat para cambiar' : 'Seleccionar base de datos'">
                            <i class="bi bi-database-fill db-selector-icon"
                               :class="{ 'bi-database-fill': !currentChatId, 'bi-lock-fill': currentChatId }"></i>
                            <select x-model="selectedDatabaseId"
                                    :disabled="currentChatId !== null"
                                    :class="{ 'placeholder': !selectedDatabaseId }"
                                    class="db-selector-pill"
                                    aria-label="Seleccionar base de datos">
                                <option value="" disabled hidden>Selecciona DB...</option>
                                <template x-for="db in activeDatabases" :key="db.id">
                                    <option :value="db.id" x-text="db.name"></option>
                                </template>
                            </select>
                            <!-- Locked indicator -->
                            <i x-show="currentChatId" 
                               class="bi bi-lock-fill position-absolute text-warning" 
                               style="right: 28px; top: 50%; transform: translateY(-50%); font-size: 0.7rem;"></i>
                        </div>
                        <button x-show="currentChatId"
                            class="btn btn-sm btn-outline-secondary border-opacity-25 rounded-pill px-2 px-md-3 fade-in d-none d-sm-inline-block"
                            @click="newChat()">
                            <i class="bi bi-plus-lg me-1"></i> <span class="d-none d-md-inline">Nuevo Chat</span>
                        </button>
                        <!-- Mobile-only new chat button (icon only) -->
                        <button x-show="currentChatId"
                            class="btn btn-sm btn-outline-secondary border-opacity-25 rounded-pill px-2 fade-in d-sm-none"
                            @click="newChat()" title="Nuevo Chat">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>

                    <!-- Right: Theme Toggle + System Info -->
                    <div class="d-flex align-items-center gap-2 ms-auto">
                        <!-- Theme Toggle (Discrete Icon) -->
                        <button @click="toggleTheme()"
                            class="theme-icon-btn"
                            :title="theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
                            :aria-label="theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
                            <i class="bi" :class="theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill'"></i>
                        </button>

                        <div class="d-flex align-items-center gap-1 gap-md-2 px-2 py-1 rounded-pill border border-secondary border-opacity-25 shadow-sm"
                            style="font-size: 0.7rem; background: var(--bg-darker) !important;">
                            <span :class="systemInfo.aiProvider === 'ollama' ? 'text-warning' : 'text-info'">
                                <i class="bi"
                                    :class="systemInfo.aiProvider === 'ollama' ? 'bi-cpu-fill' : 'bi-cloud-check-fill'"></i>
                            </span>
                            <span class="fw-bold d-none d-sm-inline" style="color: var(--c-text-2);" x-text="systemInfo.aiProvider.toUpperCase()"></span>
                            <span class="opacity-25 d-none d-sm-inline">|</span>
                            <span class="text-truncate d-none d-md-inline" style="color: var(--c-text-2); max-width: 150px;" x-text="systemInfo.model"
                                :title="systemInfo.model"></span>
                        </div>
                    </div>
                </div>

                <!-- Deep Chat Component -->
                <deep-chat id="rag-deep-chat" class="h-100 w-100 border-0" history='[]'>
                    <!-- Intro Panel Modernizado -->
                    <div style="display: none;">
                        <div style="padding: 5rem 2rem; text-align: center; color: var(--c-text-1);">
                            <div style="font-size: 3rem; margin-bottom: 1.5rem;">🚀</div>
                            <h1
                                style="font-size: 2.5rem; font-weight: 700; color: var(--c-text-1); margin-bottom: 0.5rem; letter-spacing: -0.01em;">
                                DB RAG Explorer</h1>
                            <p
                                style="color: var(--c-text-2); font-size: 1.1rem; max-width: 500px; margin: 0 auto 3rem auto; line-height: 1.6;">
                                Analiza y extrae conocimiento de tus bases de datos con la simplicidad de una charla.
                            </p>
                            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                                <div
                                    style="background: var(--bg-darker); border: 1px solid var(--c-border); padding: 1.5rem; border-radius: 12px; width: 180px;">
                                    <div style="color: var(--c-primary); font-size: 1.5rem; margin-bottom: 0.5rem;"><i
                                            class="bi bi-cpu"></i></div>
                                    <div style="font-weight: 600; font-size: 0.9rem;">RAG Engine</div>
                                </div>
                                <div
                                    style="background: var(--bg-darker); border: 1px solid var(--c-border); padding: 1.5rem; border-radius: 12px; width: 180px;">
                                    <div
                                        style="color: var(--c-text-1); opacity: 0.8; font-size: 1.5rem; margin-bottom: 0.5rem;">
                                        <i class="bi bi-chat"></i>
                                    </div>
                                    <div style="font-weight: 600; font-size: 0.9rem;">Clean Chat</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </deep-chat>
            </div>

        </main>
    </div>

    <!-- Suggestion Bubbles Component -->
    <div x-data="{ bubbleHtml: '' }" 
         x-init="fetch('/components/suggestion-bubbles.html').then(r => r.text()).then(t => bubbleHtml = t)"
         x-html="bubbleHtml">
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/src/utils.js"></script>
    <script src="/src/chat.js"></script>
    <script src="/src/suggestedQuestions.js" type="module"></script>
    <script src="/src/questionGenerator.js" type="module"></script>
    <script src="/src/components/SuggestionBubbles.js" type="module"></script>
</body>

</html>
