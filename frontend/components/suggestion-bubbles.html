<!-- Suggestion Bubbles Component -->
<div x-data="suggestionBubbles()" 
     x-init="init()"
     class="suggestion-bubble-container"
     :class="{ 'active': isOpen }"
     @keydown.escape.window="isOpen = false">
    
    <!-- Toast Notification -->
    <div x-show="showToast" 
         x-transition
         class="copy-toast"
         x-text="toastMessage">
    </div>
    
    <!-- Main Toggle Button -->
    <button @click="toggle()" 
            class="suggestion-toggle-btn"
            :class="{ 'active': isOpen }"
            aria-label="Mostrar sugerencias de preguntas">
        <i class="bi" :class="isOpen ? 'bi-x-lg' : 'bi-lightbulb'"></i>
        <span x-show="!isOpen" x-cloak>Sugerencias</span>
    </button>
    
    <!-- Bubble Menu -->
    <div x-show="isOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 transform scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 transform scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 transform scale-95 translate-y-4"
         class="suggestion-bubble-menu"
         @click.outside="isOpen = false">
        
        <!-- Header -->
        <div class="bubble-header">
            <h6 class="m-0 fw-semibold">
                <i class="bi bi-stars text-warning"></i>
                Preguntas sugeridas
            </h6>
            <span x-show="hasDynamicQuestions" class="ai-badge">
                <i class="bi bi-cpu"></i> IA
            </span>
        </div>
        
        <!-- Instructions -->
        <div class="bubble-instructions">
            <i class="bi bi-info-circle"></i>
            <span>Haz clic para copiar, luego pega con Ctrl+V</span>
        </div>
        
        <!-- Category Pills -->
        <div class="category-pills">
            <template x-for="cat in allCategories" :key="cat.category">
                <button @click="selectCategory(cat)"
                        class="category-pill"
                        :class="{ 'active': selectedCategory?.category === cat.category }"
                        :aria-pressed="selectedCategory?.category === cat.category">
                    <i class="bi" :class="cat.icon"></i>
                    <span x-text="cat.category"></span>
                </button>
            </template>
        </div>
        
        <!-- Questions List -->
        <div x-show="selectedCategory" 
             x-transition
             class="questions-list">
            <template x-for="q in selectedCategory?.questions" :key="q.text">
                <button @click="copyQuestion(q)"
                        class="question-bubble"
                        :class="{ 'dynamic': q.isDynamic }"
                        :title="q.isDynamic ? 'Generado dinámicamente por IA - Clic para copiar' : 'Clic para copiar'">
                    <span class="question-text" x-text="q.text"></span>
                    <i class="bi bi-copy"></i>
                </button>
            </template>
        </div>
        
        <!-- Empty State -->
        <div x-show="!selectedCategory" class="empty-state">
            <i class="bi bi-arrow-up-circle"></i>
            <p>Selecciona una categoría para ver preguntas</p>
        </div>
        
        <!-- Footer Actions -->
        <div class="bubble-footer">
            <button @click="generateNewQuestions()" class="refresh-btn">
                <i class="bi bi-shuffle"></i>
                Nuevas sugerencias
            </button>
        </div>
    </div>
</div>
